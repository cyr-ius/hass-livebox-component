name: HACS Action

on:
  push:
    branches: [master]
  pull_request:

jobs:
  hacs:
    name: HACS Action
    if: github.repository_owner == 'cyr-ius'
    runs-on: "ubuntu-latest"
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v7

      - name: HACS Action
        uses: "hacs/action@main"
        with:
          category: "integration"
